<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a0e08">
  <title>おいしい声がきこえてきた | キッコーマン おいしい記憶をつくりたい。</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hannari+Mincho&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a0e08;
      -webkit-font-smoothing: antialiased;
    }

    /* ────────────────────────────────────────────
       SCENE  全画面ステージ
    ──────────────────────────────────────────── */
    #scene {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: linear-gradient(
        to bottom,
        #c9a8d2 0%,
        #e895a0 28%,
        #e88478 52%,
        #e87040 74%,
        #f0a018 100%
      );
    }

    /* ────────────────────────────────────────────
       BACKGROUND  夕焼け延長画像
    ──────────────────────────────────────────── */
    #bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      pointer-events: none;
      z-index: 0;
    }

    /* ────────────────────────────────────────────
       VIDEO  動画
    ──────────────────────────────────────────── */
    #vid {
      position: absolute;
      object-fit: cover;
      z-index: 1;
      inset: 0;
      background: url('assets/bg.jpg') center / cover no-repeat;
    }

    /* ────────────────────────────────────────────
       PLAY OVERLAY  タップで再生
    ──────────────────────────────────────────── */
    #play-overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #play-overlay.gone { display: none; }

    .play-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 2px solid rgba(255, 255, 255, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .play-triangle {
      border-style: solid;
      border-width: 20px 0 20px 34px;
      border-color: transparent transparent transparent rgba(255, 255, 255, 0.92);
      margin-left: 8px;
    }

    /* ────────────────────────────────────────────
       END SCREEN  動画終了後のオーバーレイ
    ──────────────────────────────────────────── */
    #end-screen {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: none;
      background: rgba(0, 0, 0, 0.12);
    }
    #end-screen.visible { display: block; }

    /* SVGオーバーレイ: 動画と同じ座標・サイズ（JSが配置） */
    .end-overlay-svg {
      position: absolute;
      pointer-events: none;
      display: block;
    }

    /* タップ可能な透明領域（JSが座標を設定） */
    .end-tap-area {
      position: absolute;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      display: block;
    }

    /* もういちど再生ボタン（JSが座標を設定） */
    .replay-btn {
      position: absolute;
      transform: translateX(-50%);
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.45);
      color: rgba(255,255,255,0.88);
      padding: 11px 36px;
      border-radius: 30px;
      font-size: 14px;
      font-family: 'Hannari Mincho', 'はんなり明朝', 'YuMincho', serif;
      letter-spacing: 0.14em;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s, border-color 0.2s;
    }
    .replay-btn:active {
      background: rgba(255,255,255,0.12);
    }

    /* ────────────────────────────────────────────
       PROGRESS BAR  一時停止中のみ表示
    ──────────────────────────────────────────── */
    #progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 5px;
      z-index: 6;
      background: rgba(255, 255, 255, 0.28);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    #progress-bar.visible { opacity: 1; }
    #progress-fill {
      height: 100%;
      background: rgba(255, 255, 255, 0.90);
      width: 0%;
    }

    /* ────────────────────────────────────────────
       HEADER  動画終了後に表示
    ──────────────────────────────────────────── */
    #site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: none;
      transform: translateY(-100%);
      transition: transform 0.4s ease;
    }
    #site-header.visible {
      display: block;
      transform: translateY(0);
    }

    .header-row1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 52px;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .kk-logo { height: 38px; width: auto; }

    .header-row2 {
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: 38px;
      background: rgba(90, 58, 58, 0.94);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .mem-logo { height: 21px; width: auto; }

  </style>
</head>
<body>

  <!-- ── SCENE ── -->
  <div id="scene">

    <!-- 夕焼け背景画像 -->
    <img id="bg" src="assets/sunset_bg.jpg" alt=""
         onerror="this.style.display='none'">

    <!-- メイン動画 -->
    <video
      id="vid"
      playsinline
      preload="metadata"
      x-webkit-airplay="allow"
    ></video>

    <!-- 再生進行バー（一時停止中のみ表示） -->
    <div id="progress-bar" aria-hidden="true">
      <div id="progress-fill"></div>
    </div>

    <!-- タップして再生 overlay -->
    <div id="play-overlay" role="button" aria-label="タップして再生">
      <div class="play-circle">
        <div class="play-triangle"></div>
      </div>
    </div>

    <!-- 動画終了後 end screen -->
    <div id="end-screen" aria-hidden="true">

      <!-- SVGs: 動画と同じ位置・サイズでオーバーレイ（JSが配置） -->
      <!-- QR.svg: コンテンツはcanvasの約40%位置 -->
      <img class="end-overlay-svg" id="qr-svg-img"
           src="assets/QR.svg" alt="" draggable="false">
      <!-- official_site.svg: コンテンツはcanvasの約58%位置 -->
      <img class="end-overlay-svg" id="official-svg-img"
           src="assets/official_site.svg" alt="" draggable="false">

      <!-- QR タップ領域（透明、JSが座標設定） -->
      <div id="qr-btn" class="end-tap-area"
           role="button" aria-label="カメラを起動してQRコードを読み込む"></div>

      <!-- 公式サイト タップ領域 -->
      <a id="official-btn" class="end-tap-area"
         href="https://www.kikkoman.com/jp/memory"
         target="_blank" rel="noopener"
         aria-label="公式サイトはこちら"></a>

      <!-- もういちど再生ボタン（JSが位置設定） -->
      <button class="replay-btn" id="replay-btn">もういちど聴く</button>

    </div>

  </div><!-- /scene -->

  <!-- ── HEADER（動画終了後に表示） ── -->
  <header id="site-header" aria-hidden="true">
    <div class="header-row1">
      <a href="https://www.kikkoman.com/jp/" target="_blank" rel="noopener">
        <img class="kk-logo" src="assets/logo_kikkoman.svg" alt="キッコーマン おいしい記憶をつくりたい。">
      </a>
    </div>
    <div class="header-row2">
      <a href="https://www.kikkoman.com/jp/memory/" target="_blank" rel="noopener">
        <img class="mem-logo" src="assets/logo_memory.svg" alt="おいしい記憶をつくりたい。">
      </a>
    </div>
  </header>

  <script>
    (function () {
      const vid            = document.getElementById('vid');
      const playOverlay    = document.getElementById('play-overlay');
      const endScreen      = document.getElementById('end-screen');
      const header         = document.getElementById('site-header');
      const replayBtn      = document.getElementById('replay-btn');
      const progressBar    = document.getElementById('progress-bar');
      const progressFill   = document.getElementById('progress-fill');
      const qrSvgImg       = document.getElementById('qr-svg-img');
      const officialSvgImg = document.getElementById('official-svg-img');
      const qrBtn          = document.getElementById('qr-btn');
      const officialBtn    = document.getElementById('official-btn');

      /* ── 背景画像のグレー矩形に動画をぴったり合わせる ──
         web.png (7608×4279) のグレー矩形座標（実測値）
         object-fit: cover で表示した際の位置をリアルタイム計算し
         #vid を CSS inset ではなく style で直接配置する           */
      const IMG_W = 7608, IMG_H = 4279;
      const GRAY_X = 2602, GRAY_Y = 0, GRAY_W = 2405, GRAY_H = 4277;

      /* SVGのviewBox高さ（1026.92）に対するコンテンツ位置（実測値）
         QR.svg:           y ≈ 39.7% – 46.1%
         official_site.svg: y ≈ 57.4% – 59.9%                    */
      const QR_Y_START  = 0.36;
      const QR_Y_END    = 0.49;
      const OFF_Y_START = 0.54;
      const OFF_Y_END   = 0.63;
      const REPLAY_Y    = 0.79;

      function alignVid() {
        const vw = window.innerWidth, vh = window.innerHeight;
        const scale = Math.max(vw / IMG_W, vh / IMG_H);
        const ox = (IMG_W * scale - vw) / 2;
        const oy = (IMG_H * scale - vh) / 2;

        const gx = GRAY_X * scale - ox;
        const gy = GRAY_Y * scale - oy;
        const gw = GRAY_W * scale;
        const gh = GRAY_H * scale;

        const cx = Math.max(0, gx);
        const cy = Math.max(0, gy);
        const cw = Math.min(gw, vw - cx);
        const ch = Math.min(gh, vh - cy);

        const px = 1;

        /* 動画 */
        vid.style.inset  = 'auto';
        vid.style.left   = (Math.floor(cx) - px) + 'px';
        vid.style.top    = (Math.floor(cy) - px) + 'px';
        vid.style.width  = (Math.ceil(cw) + px * 2) + 'px';
        vid.style.height = (Math.ceil(ch) + px * 2) + 'px';

        /* プログレスバー */
        progressBar.style.left   = Math.floor(cx) + 'px';
        progressBar.style.width  = Math.ceil(cw) + 'px';
        progressBar.style.right  = 'auto';
        progressBar.style.bottom = Math.max(0, vh - Math.ceil(cy + ch)) + 'px';

        /* エンドスクリーン SVG オーバーレイ（動画と同じ座標・サイズ） */
        [qrSvgImg, officialSvgImg].forEach(el => {
          el.style.inset  = 'auto';
          el.style.left   = (Math.floor(cx) - px) + 'px';
          el.style.top    = (Math.floor(cy) - px) + 'px';
          el.style.width  = (Math.ceil(cw) + px * 2) + 'px';
          el.style.height = (Math.ceil(ch) + px * 2) + 'px';
        });

        /* QR タップ領域 */
        qrBtn.style.left   = Math.floor(cx) + 'px';
        qrBtn.style.width  = Math.ceil(cw) + 'px';
        qrBtn.style.top    = Math.floor(cy + QR_Y_START * ch) + 'px';
        qrBtn.style.height = Math.ceil((QR_Y_END - QR_Y_START) * ch) + 'px';

        /* 公式サイト タップ領域 */
        officialBtn.style.left   = Math.floor(cx) + 'px';
        officialBtn.style.width  = Math.ceil(cw) + 'px';
        officialBtn.style.top    = Math.floor(cy + OFF_Y_START * ch) + 'px';
        officialBtn.style.height = Math.ceil((OFF_Y_END - OFF_Y_START) * ch) + 'px';

        /* もういちど聴くボタン（中央揃え） */
        replayBtn.style.left = (Math.floor(cx) + Math.ceil(cw) / 2) + 'px';
        replayBtn.style.top  = Math.floor(cy + REPLAY_Y * ch) + 'px';
      }

      alignVid();
      window.addEventListener('resize', alignVid);

      /* ── 動画ソース選択（?v=01〜15） ── */
      const params = new URLSearchParams(location.search);
      const vParam = params.get('v');

      if (vParam && /^\d{1,2}$/.test(vParam)) {
        const n = String(parseInt(vParam, 10)).padStart(2, '0');
        vid.src = 'assets/video_' + n + '.mp4';
        const img = new Image();
        img.onload = () => { vid.poster = 'assets/poster_' + n + '.jpg'; };
        img.src = 'assets/poster_' + n + '.jpg';
      } else {
        vid.src = 'assets/drama.mp4';
      }

      /* ── 終了画面制御 ── */
      function showEndScreen() {
        endScreen.classList.add('visible');
        endScreen.setAttribute('aria-hidden', 'false');
        header.classList.add('visible');
        header.setAttribute('aria-hidden', 'false');
      }

      function hideEndScreen() {
        endScreen.classList.remove('visible');
        endScreen.setAttribute('aria-hidden', 'true');
        header.classList.remove('visible');
        header.setAttribute('aria-hidden', 'true');
      }

      vid.addEventListener('play', () => {
        playOverlay.classList.add('gone');
        progressBar.classList.remove('visible');
        if (!vid.ended) hideEndScreen();
      });

      playOverlay.addEventListener('click', () => {
        vid.play().catch(() => {});
      });

      document.getElementById('scene').addEventListener('click', (e) => {
        if (!playOverlay.classList.contains('gone')) return;
        if (endScreen.classList.contains('visible')) return;
        if (vid.paused) {
          vid.play().catch(() => {});
        } else {
          vid.pause();
        }
      });

      vid.addEventListener('pause', () => {
        if (!vid.ended) progressBar.classList.add('visible');
      });

      vid.addEventListener('timeupdate', () => {
        if (vid.duration) {
          progressFill.style.width = (vid.currentTime / vid.duration * 100) + '%';
        }
      });

      vid.addEventListener('ended', () => {
        progressBar.classList.remove('visible');
        showEndScreen();
      });

      replayBtn.addEventListener('click', () => {
        hideEndScreen();
        vid.currentTime = 0;
        vid.play().catch(() => {});
      });

      qrBtn.addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.capture = 'environment';
        document.body.appendChild(input);
        input.click();
        const cleanup = () => { if (input.parentNode) input.remove(); };
        input.addEventListener('change', cleanup);
        setTimeout(cleanup, 60000);
      });
    })();
  </script>

</body>
</html>
