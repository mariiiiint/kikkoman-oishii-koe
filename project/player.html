<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a0e08">
  <title>おいしい声がきこえてきた | キッコーマン おいしい記憶をつくりたい。</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a0e08;
      -webkit-font-smoothing: antialiased;
    }

    /* ────────────────────────────────────────────
       SCENE  全画面ステージ
    ──────────────────────────────────────────── */
    #scene {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: linear-gradient(
        to bottom,
        #c9a8d2 0%,
        #e895a0 28%,
        #e88478 52%,
        #e87040 74%,
        #f0a018 100%
      );
    }

    /* ────────────────────────────────────────────
       BACKGROUND  夕焼け延長画像
    ──────────────────────────────────────────── */
    #bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      pointer-events: none;
      z-index: 0;
    }

    /* ────────────────────────────────────────────
       VIDEO  動画
    ──────────────────────────────────────────── */
    #vid {
      position: absolute;
      object-fit: cover;
      z-index: 1;
      /* 初期値: JS が alignVid() で上書きするまでの fallback */
      inset: 0;
      /* 動画読み込み前にグレーが透けて見えないよう夕焼けグラデーション */
      background: linear-gradient(
        to bottom,
        #c9a8d2 0%,
        #e895a0 28%,
        #e88478 52%,
        #e87040 74%,
        #f0a018 100%
      );
    }

    /* ────────────────────────────────────────────
       PLAY OVERLAY  タップで再生
    ──────────────────────────────────────────── */
    #play-overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #play-overlay.gone { display: none; }

    .play-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 2px solid rgba(255, 255, 255, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .play-triangle {
      border-style: solid;
      border-width: 20px 0 20px 34px;
      border-color: transparent transparent transparent rgba(255, 255, 255, 0.92);
      margin-left: 8px;
    }

    /* ────────────────────────────────────────────
       END SCREEN  動画終了後のオーバーレイ
    ──────────────────────────────────────────── */
    #end-screen {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-top: 100px; /* ヘッダー (52px + 38px = 90px) 分を確保 */
      padding-bottom: max(40px, env(safe-area-inset-bottom, 40px));
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(18, 6, 2, 0.25) 35%,
        rgba(18, 6, 2, 0.72) 65%,
        rgba(18, 6, 2, 0.92) 100%
      );
    }
    #end-screen.visible { display: flex; }

    .end-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      width: 100%;
      max-width: 340px;
      padding: 0 24px;
    }

    /* 公式サイト SVG */
    .official-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }
    .official-svg {
      width: 68%;
      max-width: 220px;
      height: auto;
      display: block;
      filter: drop-shadow(0 2px 12px rgba(0,0,0,0.4));
    }

    /* QR コード */
    .qr-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .qr-card {
      /* QR.svg は白塗りのイラスト → 暗い背景上に直接表示 */
      background: transparent;
      padding: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .qr-svg {
      display: block;
      width: 160px;
      height: auto;
    }

    /* ────────────────────────────────────────────
       PROGRESS BAR  一時停止中のみ表示
    ──────────────────────────────────────────── */
    #progress-bar {
      position: absolute;
      bottom: 0; /* JS が alignVid() で上書き */
      left: 0;   /* JS が alignVid() で上書き */
      height: 2px;
      z-index: 6;
      background: rgba(255, 255, 255, 0.22);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    #progress-bar.visible { opacity: 1; }
    #progress-fill {
      height: 100%;
      background: rgba(255, 255, 255, 0.82);
      width: 0%;
    }

    /* もういちど再生ボタン */
    .replay-btn {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.45);
      color: rgba(255,255,255,0.82);
      padding: 11px 32px;
      border-radius: 30px;
      font-size: 13px;
      font-family: '游明朝', 'YuMincho', 'Hiragino Mincho ProN', serif;
      letter-spacing: 0.12em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s, border-color 0.2s;
    }
    .replay-btn:active {
      background: rgba(255,255,255,0.12);
    }

    /* ────────────────────────────────────────────
       HEADER  動画終了後に表示
    ──────────────────────────────────────────── */
    #site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: none;
      transform: translateY(-100%);
      transition: transform 0.4s ease;
    }
    #site-header.visible {
      display: block;
      transform: translateY(0);
    }

    /* Row 1: 白いキッコーマンロゴバー */
    .header-row1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 52px;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .kk-logo {
      height: 38px;
      width: auto;
    }

    /* Row 2: おいしい記憶バー */
    .header-row2 {
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: 38px;
      background: rgba(90, 58, 58, 0.94);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .mem-logo {
      height: 21px;
      width: auto;
    }

  </style>
</head>
<body>

  <!-- ── SCENE ── -->
  <div id="scene">

    <!-- 夕焼け背景画像 -->
    <img id="bg" src="assets/sunset_bg.jpg" alt=""
         onerror="this.style.display='none'">

    <!-- メイン動画 -->
    <video
      id="vid"
      playsinline
      preload="metadata"
      x-webkit-airplay="allow"
    ></video>

    <!-- 再生進行バー（一時停止中のみ表示） -->
    <div id="progress-bar" aria-hidden="true">
      <div id="progress-fill"></div>
    </div>

    <!-- タップして再生 overlay -->
    <div id="play-overlay" role="button" aria-label="タップして再生">
      <div class="play-circle">
        <div class="play-triangle"></div>
      </div>
    </div>

    <!-- 動画終了後 end screen -->
    <div id="end-screen" aria-hidden="true">
      <div class="end-content">

        <!-- 公式サイト誘導 SVG -->
        <div class="official-wrap">
          <a href="https://www.kikkoman.com/jp/memory" target="_blank" rel="noopener">
            <img class="official-svg"
                 src="assets/official_site.svg"
                 alt="キッコーマン おいしい記憶をつくりたい。 公式サイトはこちら">
          </a>
        </div>

        <!-- QRコード：タップでカメラ起動 -->
        <div class="qr-block">
          <div class="qr-card" id="qr-btn"
               role="button" aria-label="カメラを起動してQRコードを読み込む">
            <img class="qr-svg" src="assets/QR.svg" alt="他のQRも読み込む">
          </div>
        </div>

        <!-- もういちど再生ボタン -->
        <button class="replay-btn" id="replay-btn">もういちど聴く</button>

      </div>
    </div>

  </div><!-- /scene -->

  <!-- ── HEADER（動画終了後に表示） ── -->
  <header id="site-header" aria-hidden="true">
    <div class="header-row1">
      <a href="https://www.kikkoman.com/jp/" target="_blank" rel="noopener">
        <img class="kk-logo" src="assets/logo_kikkoman.svg" alt="キッコーマン おいしい記憶をつくりたい。">
      </a>
    </div>
    <div class="header-row2">
      <a href="https://www.kikkoman.com/jp/memory/" target="_blank" rel="noopener">
        <img class="mem-logo" src="assets/logo_memory.svg" alt="おいしい記憶をつくりたい。">
      </a>
    </div>
  </header>

  <script>
    (function () {
      const vid          = document.getElementById('vid');
      const playOverlay  = document.getElementById('play-overlay');
      const endScreen    = document.getElementById('end-screen');
      const header       = document.getElementById('site-header');
      const replayBtn    = document.getElementById('replay-btn');
      const progressBar  = document.getElementById('progress-bar');
      const progressFill = document.getElementById('progress-fill');

      /* ── 背景画像のグレー矩形に動画をぴったり合わせる ──
         web.png (7608×4279) のグレー矩形座標（実測値）
         object-fit: cover で表示した際の位置をリアルタイム計算し
         #vid を CSS inset ではなく style で直接配置する           */
      const IMG_W = 7608, IMG_H = 4279;
      const GRAY_X = 2602, GRAY_Y = 0, GRAY_W = 2405, GRAY_H = 4277;

      function alignVid() {
        const vw = window.innerWidth, vh = window.innerHeight;
        // object-fit: cover のスケール計算
        const scale = Math.max(vw / IMG_W, vh / IMG_H);
        const ox = (IMG_W * scale - vw) / 2; // 左側にはみ出す量
        const oy = (IMG_H * scale - vh) / 2; // 上側にはみ出す量

        // グレー矩形のビューポート座標
        const gx = GRAY_X * scale - ox;
        const gy = GRAY_Y * scale - oy;
        const gw = GRAY_W * scale;
        const gh = GRAY_H * scale;

        // ビューポートにクランプ（はみ出す場合は映像を小さく）
        const cx = Math.max(0, gx);
        const cy = Math.max(0, gy);
        const cw = Math.min(gw, vw - cx);
        const ch = Math.min(gh, vh - cy);

        // 1px 拡張してサブピクセルのヘアラインをカバー
        const px = 1;
        vid.style.inset  = 'auto';
        vid.style.left   = (Math.floor(cx) - px) + 'px';
        vid.style.top    = (Math.floor(cy) - px) + 'px';
        vid.style.width  = (Math.ceil(cw) + px * 2) + 'px';
        vid.style.height = (Math.ceil(ch) + px * 2) + 'px';

        // プログレスバーを動画の下端に合わせる（拡張なし）
        progressBar.style.left   = Math.floor(cx) + 'px';
        progressBar.style.width  = Math.ceil(cw) + 'px';
        progressBar.style.right  = 'auto';
        progressBar.style.bottom = Math.max(0, vh - Math.ceil(cy + ch)) + 'px';
      }

      alignVid();
      window.addEventListener('resize', alignVid);

      /* ── 動画ソース選択（?v=01〜15） ── */
      const params = new URLSearchParams(location.search);
      const vParam = params.get('v');

      if (vParam && /^\d{1,2}$/.test(vParam)) {
        const n = String(parseInt(vParam, 10)).padStart(2, '0');
        // src を同期的にセット（非同期 fetch より確実）
        vid.src = 'assets/video_' + n + '.mp4';
        // ポスター画像（存在する場合のみ設定）
        const img = new Image();
        img.onload = () => { vid.poster = 'assets/poster_' + n + '.jpg'; };
        img.src = 'assets/poster_' + n + '.jpg';
      } else {
        vid.src = 'assets/drama.mp4';
      }

      /* ── 終了画面制御 ── */
      function showEndScreen() {
        endScreen.classList.add('visible');
        endScreen.setAttribute('aria-hidden', 'false');
        header.classList.add('visible');
        header.setAttribute('aria-hidden', 'false');
      }

      function hideEndScreen() {
        endScreen.classList.remove('visible');
        endScreen.setAttribute('aria-hidden', 'true');
        header.classList.remove('visible');
        header.setAttribute('aria-hidden', 'true');
      }

      /* ── play イベントで overlay を隠す（再生が実際に始まったときのみ） ── */
      vid.addEventListener('play', () => {
        playOverlay.classList.add('gone');
        progressBar.classList.remove('visible');
        if (!vid.ended) hideEndScreen();
      });

      /* ── タップして再生 ── */
      playOverlay.addEventListener('click', () => {
        vid.play().catch(() => {});
      });

      /* ── 再生中にタップ → 一時停止 / 再開 ── */
      document.getElementById('scene').addEventListener('click', (e) => {
        if (!playOverlay.classList.contains('gone')) return; // まだ再生前
        if (endScreen.classList.contains('visible')) return; // エンドスクリーン表示中
        if (vid.paused) {
          vid.play().catch(() => {});
        } else {
          vid.pause();
        }
      });

      /* ── 一時停止 → プログレスバー表示 ── */
      vid.addEventListener('pause', () => {
        if (!vid.ended) progressBar.classList.add('visible');
      });

      /* ── 進行状況を随時更新 ── */
      vid.addEventListener('timeupdate', () => {
        if (vid.duration) {
          progressFill.style.width = (vid.currentTime / vid.duration * 100) + '%';
        }
      });

      /* ── 動画終了 → バー非表示 + end screen 表示 ── */
      vid.addEventListener('ended', () => {
        progressBar.classList.remove('visible');
        showEndScreen();
      });

      /* ── もういちど再生ボタン ── */
      replayBtn.addEventListener('click', () => {
        hideEndScreen();
        vid.currentTime = 0;
        vid.play().catch(() => {});
      });

      /* ── QR 読み込みボタン：カメラ起動 ── */
      document.getElementById('qr-btn').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.capture = 'environment'; // 背面カメラを優先
        document.body.appendChild(input);
        input.click();
        const cleanup = () => { if (input.parentNode) input.remove(); };
        input.addEventListener('change', cleanup);
        setTimeout(cleanup, 60000); // 1分後に自動クリーンアップ
      });
    })();
  </script>

</body>
</html>
